server:
  port: 4004 # Gateway listens on port 4004

spring:
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: auth-service-route
          uri: ${AUTH_SERVICE_URL:http://13.62.89.182:4005}
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        - id: patient-service-route
          uri: ${PATIENT_SERVICE_URL:http://13.62.89.182:4000}
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=1
            - JwtValidation

        - id: api-docs-patient-route
          uri: ${PATIENT_SERVICE_URL:http://13.62.89.182:4000}
          predicates:
            - Path=/api-docs/patients
          filters:
            - RewritePath=/api-docs/patients,/v3/api-docs

        - id: api-docs-auth-route
          uri: ${AUTH_SERVICE_URL:http://13.62.89.182:4005}
          predicates:
            - Path=/api-docs/auth
          filters:
            - RewritePath=/api-docs/auth,/v3/api-docs

        - id: billing-service-route
          uri: ${BILLING_SERVICE_URL:http://13.62.89.182:4001}
          predicates:
            - Path=/api/billing/**
          filters:
            - StripPrefix=1
            - JwtValidation

        - id: analytics-service-route
          uri: ${ANALYTICS_SERVICE_URL:http://13.62.89.182:8082}
          predicates:
            - Path=/api/analytics/**
          filters:
            - StripPrefix=1
            - JwtValidation

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://13.62.89.182:4005}

jwt:
  # Ensure this matches the long secret in your Auth service exactly
